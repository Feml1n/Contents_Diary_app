<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コンテンツ消費記録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>コンテンツ消費記録</h1>

  <div class="nav">
    <button onclick="show('home')">ホーム</button>
    <button onclick="show('add')">記録</button>
    <button onclick="showStatus('積み')">消費前</button>
    <button onclick="showStatus('消費中')">消費中</button>
    <button onclick="showStatus('消費済')">消費済</button>
    <button onclick="showStatus('気になる')">気になる</button>
    <button onclick="show('stats')">グラフ</button>
    <button onclick="show('genres')">ジャンル</button>
    <button onclick="show('data')">データ管理</button>
  </div>

  <div id="app">

    <!-- ホーム -->
    <div id="home">
      <h2>最近登録</h2>
      <div id="recent"></div>

      <h2>ウィッシュリスト</h2>
      <div id="wishlistPreview"></div>

      <h2>消費データ</h2>
      <div id="summary"></div>
    </div>

    <!-- 記録画面 -->
    <div id="add" class="hidden">
      <h2 id="addHeading">コンテンツ登録</h2>
      <input id="title" placeholder="タイトル">

      <select id="genre">
        <option>漫画</option>
        <option>小説</option>
        <option>アニメ</option>
        <option>映画</option>
        <option>ゲーム</option>
        <option>音楽</option>
        <option>ブログ</option>
      </select>

      <input id="price" type="number" placeholder="金額">

      <select id="status" onchange="toggleRating()">
        <option>積み</option>
        <option>消費中</option>
        <option>消費済</option>
        <option>気になる</option>
      </select>

      <div id="ratingBox" class="hidden">
        <select id="rating">
          <option value="">評価なし</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
        </select>
      </div>

      <input id="date" type="date">
      <textarea id="review" maxlength="300" placeholder="レビュー（300文字まで）"
        style="width:100%; height:100px; margin:5px 0;"></textarea>
      <div id="charCount" style="font-size:12px; color:#666;">0 / 300</div>


      <div class="form-actions">
        <button onclick="save()" id="saveBtn">保存</button>
        <button onclick="cancelEdit()" id="cancelBtn" class="hidden"
          style="background:transparent; color:var(--text-main); border:1px solid var(--border);">キャンセル</button>
      </div>
    </div>

    <!-- ステータス一覧 -->
    <div id="list" class="hidden">
      <h2 id="listTitle"></h2>
      <div id="listContent"></div>
    </div>

    <!-- 統計 -->
    <div id="stats" class="hidden">
      <h2>消費グラフ</h2>
      <canvas id="chart"></canvas>
      <div id="totalMoney"></div>

      <div style="margin-top: 30px;">
        <h2>毎日の消費記録</h2>
        <div class="year-nav">
          <button onclick="changeHeatmapYear(-1)">◀</button>
          <span id="heatmapYearLabel" class="year-label"></span>
          <button onclick="changeHeatmapYear(1)">▶</button>
        </div>
        <div class="heatmap-scroll">
          <canvas id="heatmap"></canvas>
        </div>
        <div id="heatmapTooltip"
          style="display:none; position:fixed; background:#111; color:#fff; padding:6px 10px; border-radius:6px; font-size:12px; pointer-events:none; z-index:9999;">
        </div>
      </div>
    </div>

    <!-- ジャンル別 -->
    <div id="genres" class="hidden">
      <h2>ジャンル別</h2>
      <div class="genre-filter">
        <button onclick="showGenreList('漫画')">漫画</button>
        <button onclick="showGenreList('小説')">小説</button>
        <button onclick="showGenreList('アニメ')">アニメ</button>
        <button onclick="showGenreList('映画')">映画</button>
        <button onclick="showGenreList('ゲーム')">ゲーム</button>
        <button onclick="showGenreList('音楽')">音楽</button>
        <button onclick="showGenreList('ブログ')">ブログ</button>
      </div>
      <div id="genreContent"></div>
    </div>

    <!-- データ管理 -->
    <div id="data" class="hidden">
      <h2>データ管理</h2>

      <div class="card">
        <b>バックアップ（エクスポート）</b>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">現在のデータをJSONファイルとしてパソコンやスマホに保存します。
        </p>
        <button onclick="exportData()">データをファイルに保存</button>
      </div>

      <div class="card">
        <b>復元（インポート）</b>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">
          保存したJSONファイルを読み込みます。<b>※現在のデータは上書きされます。</b></p>
        <input type="file" id="importFile" accept=".json" onchange="importData(event)">
      </div>
    </div>

    <button id="homeBtn" onclick="show('home')">🏠 ホームに戻る</button>

  </div>

  <script src="script.js"></script>

</body>

</html>
